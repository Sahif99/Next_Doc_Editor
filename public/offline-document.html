<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Next Docs Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
      }

      header {
        border-bottom: 1px solid #e2e8f0;
        background: #fff;
        padding: 16px 24px;
      }

      main {
        box-sizing: border-box;
        margin: 0 auto;
        max-width: 920px;
        padding: 24px;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        background: #fff;
        color: inherit;
        font: inherit;
      }

      input {
        margin-bottom: 14px;
        padding: 14px 16px;
        font-size: 28px;
        font-weight: 800;
      }

      textarea {
        min-height: 62vh;
        padding: 18px;
        line-height: 1.7;
        resize: vertical;
      }

      .status {
        margin: 0 0 18px;
        color: #475569;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <header><strong>Next Docs</strong></header>
    <main>
      <p class="status" id="status">Loading offline copy...</p>
      <input id="title" aria-label="Document title" />
      <textarea id="content" aria-label="Document content"></textarea>
      <div class="actions">
        <button id="save">Queue offline save</button>
      </div>
    </main>
    <script>
      const documentId = location.pathname.match(/\/documents\/([^/?#]+)/)?.[1] || "";
      const statusEl = document.getElementById("status");
      const titleEl = document.getElementById("title");
      const contentEl = document.getElementById("content");
      const saveEl = document.getElementById("save");

      function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("next-docs-offline", 2);

          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains("documents")) {
              db.createObjectStore("documents", { keyPath: "id" });
            }
            if (!db.objectStoreNames.contains("queue")) {
              db.createObjectStore("queue", { keyPath: "id", autoIncrement: true });
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function txStore(db, name, mode) {
        return db.transaction(name, mode).objectStore(name);
      }

      function getRecord(store, key) {
        return new Promise((resolve, reject) => {
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function putRecord(store, value) {
        return new Promise((resolve, reject) => {
          const request = store.put(value);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function load() {
        const db = await openDB();
        const cached = await getRecord(txStore(db, "documents", "readonly"), documentId);

        if (!cached) {
          statusEl.textContent = "No cached copy exists on this device yet.";
          titleEl.value = "Untitled Document";
          contentEl.value = "";
          return db;
        }

        titleEl.value = cached.title || "Untitled Document";
        contentEl.value = cached.content || "";
        statusEl.textContent = "Offline copy loaded. Changes will sync when the app reconnects.";
        return db;
      }

      async function queueSave(db) {
        const now = new Date().toISOString();
        const title = titleEl.value || "Untitled Document";
        const content = contentEl.value;
        const cached = await getRecord(txStore(db, "documents", "readonly"), documentId);

        await putRecord(txStore(db, "documents", "readwrite"), {
          id: documentId,
          title,
          content,
          role: cached?.role || "EDITOR",
          revision: cached?.revision || 0,
          updatedAt: now,
        });

        await putRecord(txStore(db, "queue", "readwrite"), {
          operationId: crypto.randomUUID(),
          documentId,
          title,
          content,
          baseTitle: cached?.title || title,
          baseContent: cached?.content || "",
          baseRevision: cached?.revision || 0,
          createdAt: now,
          nextAttemptAt: now,
          attempts: 0,
          status: "pending",
          lastError: "offline-fallback",
        });

        statusEl.textContent = "Saved locally and queued for sync.";
      }

      load()
        .then((db) => {
          saveEl.addEventListener("click", () => queueSave(db));
        })
        .catch(() => {
          statusEl.textContent = "Offline storage is unavailable in this browser.";
        });
    </script>
  </body>
</html>
